name: Build FitPro TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JAVA_HOME: ${{ env.JAVA_HOME }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;33.0.2" "platforms;android-33" || true

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore fitpro-release-key.keystore \
            -alias fitpro \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass fitpro123 \
            -keypass fitpro123 \
            -dname "CN=FitPro, OU=Dev, O=Mudrawala, L=India, S=India, C=IN"

      - name: Init Bubblewrap project
        run: |
          mkdir -p fitpro-twa && cd fitpro-twa
          # Answer 'n' to JDK install prompt (we have JDK 17 already)
          echo "n" | bubblewrap init --manifest https://nitintomarmudrawala.github.io/fitpro/manifest.json --directory . || true

      - name: Override twa-manifest.json
        run: |
          cat > fitpro-twa/twa-manifest.json << 'EOF'
          {
            "packageId": "com.nitin.fitpro",
            "host": "nitintomarmudrawala.github.io",
            "name": "FitPro - Personal Trainer",
            "launcherName": "FitPro",
            "display": "standalone",
            "themeColor": "#FF6B2B",
            "navigationColor": "#07070F",
            "navigationColorDark": "#07070F",
            "navigationDividerColor": "#07070F",
            "navigationDividerColorDark": "#07070F",
            "backgroundColor": "#07070F",
            "enableNotifications": false,
            "startUrl": "/fitpro/",
            "iconUrl": "https://nitintomarmudrawala.github.io/fitpro/icon.png",
            "maskableIconUrl": "https://nitintomarmudrawala.github.io/fitpro/icon.png",
            "monochromeIconUrl": "https://nitintomarmudrawala.github.io/fitpro/icon.png",
            "shortcuts": [],
            "appVersion": "2",
            "appVersionName": "2.0.0",
            "signingKey": {
              "path": "../fitpro-release-key.keystore",
              "alias": "fitpro"
            },
            "additionalTrustedOrigins": [],
            "minSdkVersion": 19,
            "targetSdkVersion": 33,
            "orientation": "portrait",
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://nitintomarmudrawala.github.io/fitpro/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://nitintomarmudrawala.github.io/fitpro/",
            "locationDelegationEnabled": true,
            "generateGradle": true
          }
          EOF

      - name: Build APK
        working-directory: fitpro-twa
        run: |
          # Answer 'n' to JDK prompt, then provide keystore passwords
          printf 'n\nfitpro123\nfitpro123\n' | bubblewrap build --skipPwaValidation

      - name: Find APK files
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: fitpro-signed-apk
          path: fitpro-twa/app-release-signed.apk
          if-no-files-found: warn

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: fitpro-unsigned-apk
          path: fitpro-twa/app-release-unsigned.apk
          if-no-files-found: warn
