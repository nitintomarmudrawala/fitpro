name: Build FitPro TWA APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: npm install -g @bubblewrap/cli
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "build-tools;33.0.2" "platforms;android-33" || true

      - name: Restore signing keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > fitpro-release-key.keystore
          keytool -list -keystore fitpro-release-key.keystore -storepass fitpro123 -storetype JKS

      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Generate PWA icons and start local server
        run: |
          mkdir -p /tmp/fitpro-icons
          python3 << 'PYEOF'
          import struct, zlib
          def png_chunk(t, d):
              c = zlib.crc32(t + d) & 0xffffffff
              return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
          def make_png(size, bg=(7,7,15), fg=(255,107,43)):
              cx, cy, r = size/2, size/2, size*0.4
              rows = b''
              for y in range(size):
                  rows += b'\x00'
                  for x in range(size):
                      rows += bytes(fg if ((x-cx)**2+(y-cy)**2)**0.5<=r else bg)
              img = b'\x89PNG\r\n\x1a\n'
              img += png_chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              img += png_chunk(b'IDAT', zlib.compress(rows))
              img += png_chunk(b'IEND', b'')
              return img
          for s in [72,96,128,144,152,192,384,512]:
              open(f'/tmp/fitpro-icons/icon-{s}.png','wb').write(make_png(s))
          print('Icons created')
          PYEOF
          python3 -m http.server 9876 --bind 127.0.0.1 --directory /tmp/fitpro-icons &
          sleep 2
          curl -s -o /dev/null -w "Icon server: HTTP %{http_code}\n" http://127.0.0.1:9876/icon-512.png

      - name: Create twa-manifest.json and generate Android project
        run: |
          mkdir -p fitpro-twa
          cat > fitpro-twa/twa-manifest.json << 'MANIFEST_EOF'
          {
            "packageId": "com.nitin.fitpro",
            "host": "nitintomarmudrawala.github.io",
            "name": "FitPro",
            "launcherName": "FitPro",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0A0A0F",
            "navigationColor": "#0A0A0F",
            "backgroundColor": "#0A0A0F",
            "startUrl": "/fitpro/",
            "iconUrl": "http://127.0.0.1:9876/icon-512.png",
            "maskableIconUrl": "http://127.0.0.1:9876/icon-512.png",
            "monochromeIconUrl": "http://127.0.0.1:9876/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../fitpro-release-key.keystore",
              "alias": "fitpro"
            },
            "signingKeyPassword": "fitpro123",
            "keyStorePassword": "fitpro123",
            "minSdkVersion": 21,
            "targetSdkVersion": 33,
            "features": {},
            "enableNotifications": false,
            "enableSiteSettingsShortcut": false,
            "fallbackType": "customtabs",
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://nitintomarmudrawala.github.io/fitpro/manifest.json",
            "shortcuts": [],
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://nitintomarmudrawala.github.io/fitpro/",
            "splashScreenFadeOutDuration": 300
          }
          MANIFEST_EOF
          cd fitpro-twa && printf '1.0.0\n1\n\n\n\n\n' | bubblewrap update

      - name: Build signed APK with Gradle
        working-directory: fitpro-twa
        run: |
          chmod +x gradlew
          KEYSTORE_PATH="$(realpath ../fitpro-release-key.keystore)"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password=fitpro123 \
            -Pandroid.injected.signing.key.alias=fitpro \
            -Pandroid.injected.signing.key.password=fitpro123

      - uses: actions/upload-artifact@v4
        with:
          name: fitpro-signed-apk
          path: fitpro-twa/app/build/outputs/apk/release/app-release.apk
