name: Build FitPro TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;33.0.2" "platforms;android-33" || true

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore fitpro-release-key.keystore \
            -alias fitpro \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass fitpro123 \
            -keypass fitpro123 \
            -dname "CN=FitPro, OU=Dev, O=Mudrawala, L=India, S=India, C=IN"

      - name: Pre-configure Bubblewrap (skip JDK/SDK prompts)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Create twa-manifest.json and generate project
        run: |
          mkdir -p fitpro-twa
          cat > fitpro-twa/twa-manifest.json << 'MANIFEST_EOF'
          {
            "packageId": "com.nitin.fitpro",
            "host": "nitintomarmudrawala.github.io",
            "name": "FitPro - Personal Trainer",
            "launcherName": "FitPro",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#FF6B2B",
            "navigationColor": "#07070F",
            "navigationColorDark": "#07070F",
            "navigationDividerColor": "#07070F",
            "navigationDividerColorDark": "#07070F",
            "backgroundColor": "#07070F",
            "enableNotifications": false,
            "startUrl": "/fitpro/",
            "iconUrl": "https://nitintomarmudrawala.github.io/fitpro/icons/icon-512.png",
            "maskableIconUrl": "https://nitintomarmudrawala.github.io/fitpro/icons/icon-512.png",
            "monochromeIconUrl": "https://nitintomarmudrawala.github.io/fitpro/icons/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../fitpro-release-key.keystore",
              "alias": "fitpro"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://nitintomarmudrawala.github.io/fitpro/",
            "minSdkVersion": 19,
            "targetSdkVersion": 33,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://nitintomarmudrawala.github.io/fitpro/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {
              "enabled": false
            },
            "hermeticMode": false
          }
          MANIFEST_EOF
          cd fitpro-twa && bubblewrap update

      - name: Build APK
        working-directory: fitpro-twa
        run: printf 'fitpro123\nfitpro123\n' | bubblewrap build --skipPwaValidation

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: fitpro-signed-apk
          path: fitpro-twa/app-release-signed.apk
          if-no-files-found: warn
