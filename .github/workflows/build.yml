name: Build FitPro TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;33.0.2" "platforms;android-33" || true

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore fitpro-release-key.keystore \
            -alias fitpro \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass fitpro123 \
            -keypass fitpro123 \
            -storetype JKS \
            -dname "CN=FitPro, OU=Dev, O=Mudrawala, L=India, S=India, C=IN"
          keytool -list -keystore fitpro-release-key.keystore -storepass fitpro123 -storetype JKS

      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Generate PWA icons and start local server
        run: |
          mkdir -p /tmp/fitpro-icons
          python3 << 'PYEOF'
          import struct, zlib
          def create_png(w, h, bg=(7,7,15), fg=(255,107,43)):
              cx, cy, r = w//2, h//2, min(w,h)//2-4
              rows = []
              for y in range(h):
                  row = []
                  for x in range(w):
                      if ((x-cx)**2+(y-cy)**2)**0.5 <= r:
                          row.extend(fg)
                      else:
                          row.extend(bg)
                  rows.append(bytes(row))
              def chunk(n, d):
                  c = n+d
                  return struct.pack('>I',len(d))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
              raw = b''.join(b'\x00'+r for r in rows)
              png = b'\x89PNG\r\n\x1a\n'
              png += chunk(b'IHDR', struct.pack('>IIBBBBB',w,h,8,2,0,0,0))
              png += chunk(b'IDAT', zlib.compress(raw,9))
              png += chunk(b'IEND', b'')
              return png
          for size in [72,96,128,144,152,192,384,512]:
              data = create_png(size,size)
              with open(f'/tmp/fitpro-icons/icon-{size}.png','wb') as f:
                  f.write(data)
              print(f'Created icon-{size}.png ({len(data)} bytes)')
          PYEOF
          python3 -m http.server 9876 --bind 127.0.0.1 --directory /tmp/fitpro-icons &
          sleep 2
          curl -s -o /dev/null -w "Icon server: HTTP %{http_code}\n" http://127.0.0.1:9876/icon-512.png

      - name: Create twa-manifest.json and generate Android project
        run: |
          mkdir -p fitpro-twa
          cat > fitpro-twa/twa-manifest.json << 'MANIFEST_EOF'
          {
            "packageId": "com.nitin.fitpro",
            "host": "nitintomarmudrawala.github.io",
            "name": "FitPro - Personal Trainer",
            "launcherName": "FitPro",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#FF6B2B",
            "navigationColor": "#07070F",
            "navigationColorDark": "#07070F",
            "navigationDividerColor": "#07070F",
            "navigationDividerColorDark": "#07070F",
            "backgroundColor": "#07070F",
            "enableNotifications": false,
            "startUrl": "/fitpro/",
            "iconUrl": "http://127.0.0.1:9876/icon-512.png",
            "maskableIconUrl": "http://127.0.0.1:9876/icon-512.png",
            "monochromeIconUrl": "http://127.0.0.1:9876/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../fitpro-release-key.keystore",
              "alias": "fitpro"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://nitintomarmudrawala.github.io/fitpro/",
            "minSdkVersion": 19,
            "targetSdkVersion": 33,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://nitintomarmudrawala.github.io/fitpro/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {
              "enabled": false
            },
            "hermeticMode": false
          }
          MANIFEST_EOF
          cd fitpro-twa && printf '1.0.0\n1\n\n\n\n\n' | bubblewrap update --skipPwaValidation
          echo "=== Project files generated ==="
          ls -la

      - name: Build signed APK with Gradle
        working-directory: fitpro-twa
        run: |
          chmod +x gradlew
          KEYSTORE_PATH="$(realpath ../fitpro-release-key.keystore)"
          echo "Keystore: $KEYSTORE_PATH"
          ls -la "$KEYSTORE_PATH"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password=fitpro123 \
            -Pandroid.injected.signing.key.alias=fitpro \
            -Pandroid.injected.signing.key.password=fitpro123
          echo "=== Build output ==="
          find . -name "*.apk" 2>/dev/null

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: fitpro-signed-apk
          path: fitpro-twa/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
